<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>楽しむコツ</title>

    <link rel="stylesheet" href="css/tips.css" />
  </head>

  <body>
    <section class="tips">
      <h2>楽しむコツ</h2>

      <div class="tips-container">
        <!-- 左側 -->
        <div class="photo-area">
          <button class="arrow up">↑</button>

          <img src="img/tip1.png" alt="" />
          <img src="img/tip2.png" alt="" />
          <img src="img/tip3.png" alt="" />

          <button class="arrow down">↓</button>
        </div>

        <!-- 右側 -->

        <div class="text-area">
          <h3>お客さんと関わる</h3>

          <p>
            これはダミーです。これはダミーです。これはダミーです。 これはダミーです。これはダミーです。
            これはダミーです。これはダミーです。
          </p>
        </div>
      </div>
    </section>

    <section class="quiz">
      <div class="quiz-box">
        <div>
          <h3>なぞなぞ③</h3>

          <p>コンビニで一番びっくりする具は？</p>
        </div>

        <button>答え</button>
      </div>
    </section>
  </body>
</html>
