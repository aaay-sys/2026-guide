<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メリット - コンビニバイト</title>
  <!-- cssフォルダの中のmerit.cssを読み込む -->
  <link rel="stylesheet" href="css/merit.css">
</head>
<body>

  <div class="container">
    <!-- ホームに戻るボタン（右上） -->
    <a href="index.html" class="home-btn">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#5d4037" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </a>

    <!-- タイトル -->
    <h1 class="section-title">メリット</h1>

    <!-- BEST 3 セクション -->
    <section class="merit-section">
      <div class="badge-best3">BEST 3</div>
      <div class="content-box">
        <div class="ranking-item rank-1">
          <div class="rank-num">
            <span>1</span>
            <div class="crown"></div>
          </div>
          <p class="rank-text"><span class="rank-suffix">位</span>髪色、アクセサリーの規制が少ない</p>
        </div>
        <div class="ranking-item">
          <div class="rank-num">2</div>
          <p class="rank-text"><span class="rank-suffix">位</span>単発バイトに応募できる</p>
        </div>
        <div class="ranking-item">
          <div class="rank-num">3</div>
          <p class="rank-text"><span class="rank-suffix">位</span>廃棄予定の商品をもらえる場合がある</p>
        </div>
      </div>
    </section>

    <!-- その他 セクション -->
    <section class="merit-section">
      <div class="badge-others">その他</div>
      <div class="content-box">
        <ul class="others-list">
          <li>シフトの融通が利きやすい</li>
          <li>敬語や接客マナーを学べる</li>
          <li>新商品、限定品情報をいち早く知れる</li>
          <li>幅広い年齢の人と関われる</li>
          <li>スーパーの安さに気付く</li>
        </ul>
        <p class="etc-text">などなど</p>
      </div>
    </section>

    <!-- コンビニあるあるコーナー -->
    <div class="aruaru-box">
      <div class="aruaru-main">
        <h3>コンビニあるある</h3>
        <p>期間限定商品は買ってしまう</p>
      </div>
      <div class="aruaru-sub">
        <p>コンビニは一週間ごとに期間限定商品を発売されます。しかも、その週でしか買えないものやコラボ商品が多いため、ついつい買ってしまいます</p>
      </div>
    </div>

    <!-- フッター注釈 -->
    <footer class="footer-note">
      <p>これはすべて個人の意見です</p>
    </footer>
  </div>

</body>
</html>
