<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>仕事内容 - コンビニバイト</title>
    <!-- cssフォルダの中のshigoto.cssを読み込む -->
    <link rel="stylesheet" href="css/shigoto.css" />
  </head>
  <body>

    <div class="container">
      <!-- ホームに戻るボタン（右上） -->
      <a href="index.html" class="home-btn">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#5d4037" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </a>

      <!-- タイトル -->
      <h1 class="section-title">仕事内容</h1>

      <!-- 仕事内容カード一覧（PCは2列、スマホは1列） -->
      <div class="card-grid">

        <!-- 1. レジ対応 -->
        <div class="job-card">
          <div class="img-box img-box1">
            <img src="img/レジ.png" alt="レジ対応" />
          </div>
          <div class="job-name"
               data-img="img/レジ.png"
               data-item1="商品のお会計"
               data-item2="配達物の受け取り"
               data-item3="代行収納のお会計"
               data-item4="現金管理">レジ対応</div>
        </div>

        <!-- 2. フライヤー -->
        <div class="job-card">
          <div class="img-box img-box2">
            <img src="img/チキン.png" alt="フライヤー商品の作成" />
          </div>
          <div class="job-name"
               data-img="img/チキン.png"
               data-item1="フライヤー商品の作成"
               data-item2="廃棄時間管理"
               data-item3="来店数に応じて作成数調整"
               data-item4="裏にある在庫確認">フライヤー商品の作成</div>
        </div>

        <!-- 3. 納品作業 -->
        <div class="job-card">
          <div class="img-box img-box3">
            <img src="img/お弁当.png" alt="納品作業" />
          </div>
          <div class="job-name"
               data-img="img/お弁当.png"
               data-item1="納品された商品を陳列"
               data-item2="裏に残っている商品の陳列"
               data-item3="賞味期限のチェック（鮮度管理）"
               data-item4="商品の陳列場所の調整">品出し作業</div>
        </div>

        <!-- 4. 前出し・顔出し -->
        <div class="job-card">
          <div class="img-box img-box4">
            <img src="img/ジュース.png" alt="前出し・顔出し" />
          </div>
          <div class="job-name"
               data-img="img/ジュース.png"
               data-item1="陳列されている商品の縦列・横間隔を合わせる"
               data-item2="パッケージが正面に来ているか確認"
               data-item3="新商品が見やすい場所にあるか確認"
               data-item4="賞味期限のチェック（鮮度管理）">前出し・顔出し</div>
        </div>

        <!-- 5. コーヒーマシーン洗浄 -->
        <div class="job-card">
          <div class="img-box img-box5">
            <img src="img/コーヒー.png" alt="コーヒーマシーンの洗浄" />
          </div>
          <div class="job-name"
               data-img="img/コーヒー.png"
               data-item1="パーツの分解と水洗い"
               data-item2="ミルクノズルの洗浄"
               data-item3="豆の補充とカス捨て"
               data-item4="マシーン周りの拭き上げ">コーヒーマシーンの洗浄</div>
        </div>

        <!-- 6. 消耗品の補充 -->
        <div class="job-card">
          <div class="img-box img-box6">
            <img src="img/消耗品.png" alt="消耗品の補充" />
          </div>
          <div class="job-name"
               data-img="img/消耗品.png"
               data-item1="レジ袋・お箸・おしぼりなどの補充"
               data-item2="タバコの補充"
               data-item3="レシートロール紙・コピー用紙の交換"
               data-item4="手洗い石鹸・消毒液の補充"
               data-item5="フライヤー商品の添付調味料の補充"
               data-item6="コーヒーカップ・フタの補充"
               >消耗品の補充</div>
        </div>

        <!-- 7. 店内清掃 -->
        <div class="job-card">
          <div class="img-box img-box7">
            <img src="img/モップ.png" alt="店内清掃" />
          </div>
          <div class="job-name"
               data-img="img/モップ.png"
               data-item1="床掃除・窓掃除"
               data-item2="商品棚の掃除"
               data-item3="トイレ清掃・トイレットペーパーの交換"
               data-item4="ゴミ箱のゴミ捨て・袋交換">店内清掃</div>
        </div>

        <!-- 8. お客様対応 -->
        <div class="job-card">
          <div class="img-box img-box8">
            <img src="img/客対応.png" alt="お客様対応" />
          </div>
          <div class="job-name"
               data-img="img/客対応.png"
               data-item1="商品の場所のご案内"
               data-item2="コピー機・マルチコピー機の操作補助"
               data-item3="電話対応"
               data-item4="明るい挨拶と笑顔の対応">お客様対応</div>
        </div>

      </div>

      <!-- コンビニあるあるコーナー -->
      <div class="aruaru-box">
        <div class="aruaru-main">
          <h3>コンビニあるある</h3>
          <p>反射神経で挨拶をしてしまう</p>
        </div>
        <div class="aruaru-sub">
          <p>
            私は友達とドラッグストアに行った際、店員さんに「いらっしゃいませ！」と言われたのに対して「いらっしゃいませ！」とアルバイト感覚で反復し、大恥をかきました。
          </p>
        </div>
      </div>

      <!-- フッター注釈 -->
      <footer class="footer-note">
        <p>これはすべて個人の意見です</p>
      </footer>
    </div>

   <!-- 💡 モーダル（書き換え用IDをセット済み） -->
    <div class="overlay" id="jobOverlay">
      <div class="overlay-card">
        <button class="close-btn" id="closeBtn">×</button>
        
        <div class="card-content">
          <div class="card-img-box">
            <img src="" alt="仕事画像" id="modalImg">
          </div>
          <div class="card-list">
            <div class="list-item" id="modalItem1"></div>
            <div class="list-item" id="modalItem2"></div>
            <div class="list-item" id="modalItem3"></div>
            <div class="list-item" id="modalItem4"></div>
            <div class="list-item" id="modalItem5"></div>
            <div class="list-item" id="modalItem6"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- JavaScriptファイル -->
    <script src="js/js/script.js"></script>
  </body>
</html>
